name: CI - Tests y Linting

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Ejecutar tests
        env:
          GITHUB_TOKEN: "test-token-placeholder"
        run: |
          python -m pytest tests/ -v --tb=short

      - name: Verificar imports
        run: |
          python -c "from config.settings import *; print('Config OK')"
          python -c "from src.prompts import RAG_PROMPT_TEMPLATE; print('Prompts OK')"
          python -c "from src.cargar_documentos import cargar_documentos; print('Carga OK')"
